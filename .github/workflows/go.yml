name: Go

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22.4'

    - name: Check formatting
      run: go fmt ./...

    - name: Run vet
      run: go vet ./...

    - name: Verify go.mod
      run: go mod tidy && git diff --exit-code

    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v -cover ./...

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.22.4'

    - name: Build binaries
      run: |
        mkdir -p dist
        go build -o dist/lines-linux ./cmd/lines
        GOOS=darwin GOARCH=amd64 go build -o dist/lines-darwin-amd64 ./cmd/lines
        GOOS=windows GOARCH=amd64 go build -o dist/lines-windows-amd64.exe ./cmd/lines

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: dist/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
